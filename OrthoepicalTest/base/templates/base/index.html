<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
        <title>Орфоэпический Тест</title>
    </head>
    <body style="font-family: Roboto">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-7 p-5">
                    <h3 class="text-center fw-bold mb-3" style="letter-spacing: 2px">Орфоэпический тест</h2>
                    <p style="text-align: justify">Кликни по гласной букве, на которую должно приходиться верное ударение.</p>
                    <div>
                        <span style="background: #98FB98; padding: 1px">Зеленый</span> - указаны верные ударения<br>
                        <span style="background: #fb9898; padding: 1px">Красный цвет</span> - указаны неверные ударения<br>
                        <span style="background: #e9fb98; padding: 1px">Желтый цвет</span> - исправленны неверные ударения<br>
                    </div>
                    <div class="text-muted fs-5 mt-3">Слова для пояснения выделены курсивом</div>
                    <div class="row my-4 fs-5 justify-content-between">
                        <div class="col">
                            <a href="/dict/" class="fw-bold" style="color: #656ab6">
                                в словарь
                            </a>
                        </div>
                        <div class="col">
                            <a class="fw-bold" style="color: #5a9452; cursor: pointer" onclick="reloadPage()">
                                обновить тест
                            </a>
                        </div>
                    </div>
                    <div class="offset-3" id="words-section"></div>
                </div>
            </div>
        </div>
        <script>
            words = "{{words}}";
            words = words.split(";");
            wordsSection = document.querySelector('#words-section');

            for (let word of words) {
                res = `<div class="fs-4">`;
                vowels = ['а', 'я', 'у', 'ю', 'о', 'е', 'ё', 'э', 'и', 'ы'];

                if (word.includes('(')) {
                    word_1 = word.slice(0, word.indexOf('(') - 1);
                    word_2 = word.slice(word.indexOf('('), word.length);
                    
                    for (let letter of word_1) {
                        if (vowels.includes(letter.toLowerCase())) {
                            res += `<span style="cursor: pointer" onclick="checkLetter(this)">${letter.toLowerCase()}</span> `;
                        } else {
                            res += `<span>${letter.toLowerCase()}</span> `;
                        }
                    }

                    res +=`<span class="text-muted" style="font-style: italic">${word_2}</span></div>`;
                    wordsSection.innerHTML += res;
                } else {
                    for (let i in word) {
                        if (vowels.includes(word[i].toLowerCase())) {
                            res += `<span style="cursor: pointer;" onclick="checkLetter(this, ${i})">${word[i].toLowerCase()}</span> `;
                        } else {
                            res += `<span>${word[i].toLowerCase()}</span> `;
                        }
                    }

                    res += '</div>';
                    wordsSection.innerHTML += res;
                }
            }

            function checkLetter(letter, index) {
                console.log(letter.textContent);

                for (let word of words) {
                    if (word.toLowerCase().replace(/ /g, '') == letter.parentNode.textContent.replace(/ /g, '')) {
                        regex = new RegExp("[А-ЯЁ]");
                        corretStress = word.search(regex);
                        console.log(corretStress);

                        if (corretStress == index) {
                            console.log(true);
                            letter.style = "background: #98FB98";
                        } else {
                            console.log(false);
                            letter.style = "background: #fb9898";
                            letter.parentNode.querySelectorAll('span')[corretStress].style = "background: #e9fb98";
                        }

                        letter.parentNode.style = "pointer-events: none";
                    } else {
                        console.log(letter.parentNode.textContent)
                    }
                }
            }

            function reloadPage() {
                location.reload();
            }
        </script>
    </body>
</html>
